name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  psscriptanalyzer:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Settings ./PSScriptAnalyzerSettings.psd1
          $results | Format-Table RuleName, Severity, ScriptName, Line, Message -AutoSize | Out-String -Width 200 | Write-Host
          $errors = @($results | Where-Object Severity -eq 'Error')
          Write-Host "Errors: $($errors.Count), Warnings: $(@($results | Where-Object Severity -eq 'Warning').Count)"
          if ($errors.Count -gt 0) { exit 1 }

  pester:
    name: Repository Standards (Pester)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Pester tests
        shell: pwsh
        run: |
          Install-Module Pester -MinimumVersion 5.5 -Force -Scope CurrentUser
          Invoke-Pester -Path ./tests -CI

  bicep:
    name: Bicep Build (Linter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Bicep CLI
        run: az bicep install

      - name: Build all Bicep entry points
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem -Recurse -Filter '*.bicep' | Where-Object FullName -NotMatch '[\\/]modules[\\/]' | ForEach-Object {
              Write-Host "::group::$($_.FullName)"
              az bicep build --file $_.FullName --stdout 1>$null
              if ($LASTEXITCODE -ne 0) { $failed = $true }
              Write-Host '::endgroup::'
          }
          if ($failed) { exit 1 }

  markdownlint:
    name: Markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          config: .markdownlint.jsonc
          globs: |
            **/*.md
            !node_modules

  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
